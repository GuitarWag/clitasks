run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gci
    - gocritic
    - gofmt
    - govet
    - revive
    - staticcheck
    - unconvert
    - unused

linters-settings:
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/GuitarWag/clitasks)
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
